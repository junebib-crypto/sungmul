function exportData(){
  var data={items:IT,txs:TX,purs:PU,sups:ld('mj_sups',[]),exportDate:new Date().toISOString()};
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='명지성당_성물방_백업_'+new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'')+'.json';
  a.click();
  URL.revokeObjectURL(url);
  alert('백업 파일이 다운로드되었습니다. 안전한 곳에 보관하세요!');
}
function importData(){
  var input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.items||!data.txs||!data.purs){alert('올바른 백업 파일이 아닙니다.');return;}
        if(!confirm('현재 데이터를 백업 파일로 교체합니다. 계속하시겠습니까?'))return;
        IT=data.items;TX=data.txs;PU=data.purs;
        // localStorage에 저장
        try{localStorage.setItem('mj_it',JSON.stringify(IT));}catch(e){}
        try{localStorage.setItem('mj_tx',JSON.stringify(TX));}catch(e){}
        try{localStorage.setItem('mj_pu',JSON.stringify(PU));}catch(e){}
        if(data.sups){try{localStorage.setItem('mj_sups',JSON.stringify(data.sups));}catch(e){}}
        if(data.cats){try{localStorage.setItem('mj_cats',JSON.stringify(data.cats));}catch(e){}}
        // Firebase에 한번에 저장
        if(typeof db!=='undefined'){
          showSyncStatus('🔄 Firebase에 저장 중...','#1b6ca8');
          var fbData={
            'mj_it':IT,'mj_tx':TX,'mj_pu':PU,
            'mj_sups':data.sups||[],'mj_cats':data.cats||[]
          };
          db.ref('sungmul').update(fbData)
            .then(function(){
              showSyncStatus('✅ 저장됨','#1a7a30');
              alert('복원 완료! (품목 '+IT.length+'개, 판매 '+TX.length+'건, 매입 '+PU.length+'건)');
              go(0);
            })
            .catch(function(e){
              showSyncStatus('⚠️ Firebase 저장실패 - 로컬만 저장됨','#c0392b');
              alert('복원 완료! (로컬 저장됨)\nFirebase 오류: '+e.message);
              go(0);
            });
        } else {
          alert('복원 완료! (품목 '+IT.length+'개, 판매 '+TX.length+'건, 매입 '+PU.length+'건)');
          go(0);
        }
      }catch(err){alert('파일 읽기 오류: '+err.message);}
    };
    reader.readAsText(file,'utf-8');
  };
  input.click();
}

function printBank(){
  var bankAcc=ld('mj_bank',{name:'명지성당 성물방',num:'',balance:0});
  var inTx=TX.filter(function(t){return t.type==='출고'&&t.pay==='계좌이체';})
    .map(function(t){return{rd:t.rd,dt:t.rd.slice(0,10),name:ex(t.name)+(t.spec?' ('+ex(t.spec)+')':''),amt:t.qty*(t.sale||0),type:'입금',note:t.note&&t.note!=='-'?t.note:''};});
  var bankExtra=ld('mj_bank_extra',[]);
  var allTxFull=[...inTx,...bankExtra].sort(function(a,b){return a.rd<b.rd?-1:1;});

  function inRange(rd){
    try{
      var d=ymd(new Date(rd));
      if(bkFltMode==='연도별'&&bkFltYear) return d.slice(0,4)===bkFltYear;
      if(bkFltMode==='월별'&&bkFltMo) return d.slice(0,7)===bkFltMo;
      if(bkFltMode==='일별'&&bkFltDay) return d===bkFltDay;
      if(bkFltMode==='기간별') return (!bkFltFrom||d>=bkFltFrom)&&(!bkFltTo||d<=bkFltTo);
      return true;
    }catch(e){return true;}
  }
  var allTx=allTxFull.filter(function(t){return inRange(t.rd);});

  var runningBase=bankAcc.balance||0;
  var dateLimit=bkFltMode==='일별'?bkFltDay:bkFltMode==='월별'?bkFltMo+'-01':bkFltMode==='연도별'?bkFltYear+'-01-01':bkFltMode==='기간별'?(bkFltFrom||''):null;
  if(dateLimit){
    allTxFull.forEach(function(t){
      var d=(t.rd||'').slice(0,10);
      if(d<dateLimit) runningBase+=(t.type==='입금'?t.amt:-t.amt);
    });
  }
  var running=runningBase;
  var balance=runningBase+allTx.reduce(function(a,t){return a+(t.type==='입금'?t.amt:-t.amt);},0);
  var fIn=allTx.filter(function(t){return t.type==='입금';}).reduce(function(a,t){return a+t.amt;},0);
